name: Build Finance APK (No EAS)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL for the APK'
        required: true
        default: 'https://finance.pm.sa/api/v1'
  push:
    branches:
      - main
    paths:
      - 'finance-mobile/**'
      - 'finance-mobile-starter/**'
      - '.github/workflows/build-finance-apk.yml'

concurrency:
  group: finance-apk-build
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build standalone APK without EAS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      API_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}
      EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}
      EXPO_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve mobile folder
        id: mobile
        shell: bash
        run: |
          if [ -f finance-mobile/package.json ]; then
            echo "dir=finance-mobile" >> "$GITHUB_OUTPUT"
          elif [ -f finance-mobile-starter/package.json ]; then
            echo "dir=finance-mobile-starter" >> "$GITHUB_OUTPUT"
          else
            echo "No mobile package.json was found."
            find . -maxdepth 3 -name package.json -print
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ steps.mobile.outputs.dir }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        shell: bash
        run: |
          cd "${{ steps.mobile.outputs.dir }}"
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Configure API URL
        shell: bash
        run: |
          cd "${{ steps.mobile.outputs.dir }}"
          cat > .env <<EOF
          API_URL=${API_URL}
          EXPO_PUBLIC_API_URL=${API_URL}
          EXPO_PUBLIC_API_BASE_URL=${API_URL}
          EOF
          cat .env

      - name: Generate Android project locally
        shell: bash
        run: |
          cd "${{ steps.mobile.outputs.dir }}"
          npx expo prebuild --platform android --clean --no-install --non-interactive

      - name: Build release APK with bundled JS
        shell: bash
        run: |
          cd "${{ steps.mobile.outputs.dir }}/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p apk-output
          APK_PATH="$(find "${{ steps.mobile.outputs.dir }}/android/app/build/outputs/apk/release" -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was generated."
            find "${{ steps.mobile.outputs.dir }}/android/app/build/outputs" -type f || true
            exit 1
          fi
          cp "$APK_PATH" apk-output/finance-release.apk
          ls -lh apk-output/finance-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-release-apk-no-eas
          path: apk-output/finance-release.apk
          if-no-files-found: error
          retention-days: 14
