name: Build Finance APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL for the APK'
        required: true
        default: 'https://finance.pm.sa/api/v1'
  pull_request:
    branches:
      - main
    paths:
      - 'finance-mobile-starter/**'
      - '.github/workflows/build-finance-apk.yml'
  push:
    branches:
      - main
    paths:
      - 'finance-mobile-starter/**'
      - '.github/workflows/build-finance-apk.yml'

concurrency:
  group: finance-apk-build
  cancel-in-progress: true

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: finance-mobile-starter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: finance-mobile-starter/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Configure API URL
        shell: bash
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://finance.pm.sa/api/v1"
          fi
          cat > .env <<EOF
          EXPO_PUBLIC_API_URL=$API_URL
          EXPO_PUBLIC_API_BASE_URL=$API_URL
          API_URL=$API_URL
          EOF
          cat .env

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK with bundled JS
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p ../apk-output
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was generated."
            find android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$APK_PATH" ../apk-output/finance.apk
          ls -lh ../apk-output/finance.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-apk
          path: finance-mobile-starter/apk-output/finance.apk
          if-no-files-found: error
          retention-days: 14
