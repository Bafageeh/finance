name: Build Finance APK (No EAS)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL for the APK'
        required: true
        default: 'https://finance.pm.sa/api/v1'
  push:
    branches:
      - main
    paths:
      - 'finance-mobile/**'
      - '.github/workflows/build-finance-apk.yml'

concurrency:
  group: finance-apk-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    name: Build standalone APK without EAS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      API_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}
      EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}
      EXPO_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify standalone finance-mobile app
        shell: bash
        run: |
          if [ ! -f finance-mobile/package.json ]; then
            echo "finance-mobile/package.json is required. finance-mobile-starter is no longer used."
            exit 1
          fi
          if [ ! -d finance-mobile/src ]; then
            echo "finance-mobile/src is required."
            exit 1
          fi
          echo "Build dir: finance-mobile"
          grep -n "isDoneClient\|!isDoneClient\|رأس المال المتبقي\|الدفعة القادمة" finance-mobile/src/components/ClientListItem.tsx || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        shell: bash
        run: |
          cd finance-mobile
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Configure API URL
        shell: bash
        run: |
          cd finance-mobile
          cat > .env <<EOF
          API_URL=${API_URL}
          EXPO_PUBLIC_API_URL=${API_URL}
          EXPO_PUBLIC_API_BASE_URL=${API_URL}
          EOF
          cat .env

      - name: Generate Android project locally
        shell: bash
        run: |
          cd finance-mobile
          npx expo prebuild --platform android --clean --no-install --non-interactive

      - name: Build release APK with bundled JS
        shell: bash
        run: |
          cd finance-mobile/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p apk-output
          APK_PATH="$(find finance-mobile/android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was generated."
            find finance-mobile/android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$APK_PATH" apk-output/finance-release.apk
          ls -lh apk-output/finance-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-release-apk-no-eas
          path: apk-output/finance-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish APK in GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="finance-apk-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "apk-output/finance-release.apk#finance-release.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Finance APK ${GITHUB_RUN_NUMBER}" \
            --notes "نسخة تطبيق التمويل مبنية عبر GitHub Actions بدون استخدام رصيد EAS."

