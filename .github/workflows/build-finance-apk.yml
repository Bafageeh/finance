name: Build Finance APK (No EAS)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL for the APK'
        required: true
        default: 'https://finance.pm.sa/api/v1'
  push:
    branches:
      - main
    paths:
      - 'finance-mobile-starter/**'
      - '.github/workflows/build-finance-apk.yml'

concurrency:
  group: finance-apk-build
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build installable APK without EAS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: finance-mobile-starter

    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}
      EXPO_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_url || 'https://finance.pm.sa/api/v1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: finance-mobile-starter/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project locally
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build debug APK locally
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p ../apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk ../apk-output/finance-debug.apk
          ls -lh ../apk-output/finance-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-debug-apk-no-eas
          path: finance-mobile-starter/apk-output/finance-debug.apk
          if-no-files-found: error
          retention-days: 14
