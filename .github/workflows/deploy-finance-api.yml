name: Deploy Finance API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'finance-api/**'
      - '.github/workflows/deploy-finance-api.yml'

concurrency:
  group: finance-api-production-deploy
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy Laravel API to server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy API
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
          set -Eeuo pipefail

          REPO_ROOT="/mnt/home-storage/home/pmsa/apps/finance"
          REPO_API="${REPO_ROOT}/finance-api"

          if [ ! -d "$REPO_ROOT/.git" ]; then
            echo "Finance repository not found at: $REPO_ROOT"
            exit 1
          fi

          cd "$REPO_ROOT"
          git remote set-url origin https://github.com/Bafageeh/finance.git
          git fetch origin main
          git reset --hard origin/main

          if [ ! -f "$REPO_API/artisan" ]; then
            echo "Laravel API not found at: $REPO_API"
            exit 1
          fi

          cd "$REPO_API"

          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

          php artisan migrate --force
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache

          echo "==> Finance API deployment completed"
          php artisan route:list | grep -E 'api/v1/(auth/login|login|reports/active-late-clients-xlsx)' || true
          EOF
