name: Deploy Finance API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'finance-api/**'
      - '.github/workflows/deploy-finance-api.yml'

jobs:
  deploy-api:
    name: Deploy Laravel API to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy API
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
          set -e

          REPO_ROOT="/home/pmsa/apps/finance"
          REPO_API="${REPO_ROOT}/finance-api"
          SERVED_API="/home/pmsa/apps/finance-api"

          cd "$REPO_ROOT"
          git fetch origin main
          git reset --hard origin/main

          # Keep the legacy served API path updated too, because the web server may still point to it.
          # Preserve runtime files such as .env, storage, vendor, and framework cache folders.
          mkdir -p "$SERVED_API"
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='bootstrap/cache/*.php' \
            "$REPO_API/" "$SERVED_API/"

          cd "$SERVED_API"

          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader
          fi

          if [ -f artisan ]; then
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:clear
            php artisan route:clear
            php artisan cache:clear
            echo "==> Registered login routes:"
            php artisan route:list | grep -E 'api/v1/(auth/login|login)' || true
          fi
          EOF
