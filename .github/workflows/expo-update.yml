name: Publish Expo update

on:
  push:
    branches:
      - main
    paths:
      - 'finance-mobile-starter/**'
      - '.github/workflows/expo-update.yml'
  workflow_dispatch:

jobs:
  publish-update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-mobile-starter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finance-mobile-starter/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update to Expo preview branch
        env:
          EXPO_PUBLIC_API_BASE_URL: https://my.pm.sa/api/v1
          EXPO_PUBLIC_USE_MOCKS: 'false'
        run: npx eas update --branch preview --message "GitHub update ${{ github.sha }}" --non-interactive
