name: Build Finance APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'finance-mobile-starter/**'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

concurrency:
  group: finance-android-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK without EAS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: finance-mobile-starter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Configure production API
        run: |
          cat > .env <<'ENV'
          EXPO_PUBLIC_API_URL=https://finance.pm.sa/api/v1
          EXPO_PUBLIC_API_BASE_URL=https://finance.pm.sa/api/v1
          API_URL=https://finance.pm.sa/api/v1
          ENV

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Configure Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No Android signing secrets configured. Using the generated default release signing."
            exit 0
          fi

          if [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "One or more Android signing secrets are missing. Continuing with the generated default release signing for this APK."
            exit 0
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' > /tmp/finance-release.keystore.base64

          if ! base64 --decode /tmp/finance-release.keystore.base64 > android/app/finance-release.keystore 2>/tmp/finance-keystore-decode.log; then
            echo "ANDROID_KEYSTORE_BASE64 is not valid base64. Continuing with the generated default release signing for this APK."
            rm -f android/app/finance-release.keystore
            exit 0
          fi

          if [ ! -s android/app/finance-release.keystore ]; then
            echo "Decoded keystore is empty. Continuing with the generated default release signing for this APK."
            rm -f android/app/finance-release.keystore
            exit 0
          fi

          cat >> android/gradle.properties <<EOF
          FINANCE_RELEASE_STORE_FILE=finance-release.keystore
          FINANCE_RELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          FINANCE_RELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS
          FINANCE_RELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          EOF

          python3 <<'PY'
          from pathlib import Path

          path = Path('android/app/build.gradle')
          text = path.read_text()

          release_config = """        release {
                      if (project.hasProperty('FINANCE_RELEASE_STORE_FILE')) {
                          storeFile file(FINANCE_RELEASE_STORE_FILE)
                          storePassword FINANCE_RELEASE_STORE_PASSWORD
                          keyAlias FINANCE_RELEASE_KEY_ALIAS
                          keyPassword FINANCE_RELEASE_KEY_PASSWORD
                      }
                  }
          """

          if 'FINANCE_RELEASE_STORE_FILE' not in text:
              marker = '        debug {'
              start = text.find(marker)
              if start == -1:
                  raise SystemExit('Could not find debug signing config in android/app/build.gradle')

              depth = 0
              end = None
              for index in range(start, len(text)):
                  char = text[index]
                  if char == '{':
                      depth += 1
                  elif char == '}':
                      depth -= 1
                      if depth == 0:
                          end = index + 1
                          break

              if end is None:
                  raise SystemExit('Could not detect end of debug signing config in android/app/build.gradle')

              text = text[:end] + '\n' + release_config + text[end:]

          build_types_start = text.find('buildTypes')
          release_start = text.find('release {', build_types_start)
          if release_start == -1:
              raise SystemExit('Could not find release build type in android/app/build.gradle')

          old = 'signingConfig signingConfigs.debug'
          new = "signingConfig project.hasProperty('FINANCE_RELEASE_STORE_FILE') ? signingConfigs.release : signingConfigs.debug"
          signing_index = text.find(old, release_start)
          if signing_index != -1:
              text = text[:signing_index] + new + text[signing_index + len(old):]
          elif new not in text[release_start:]:
              raise SystemExit('Could not update release signingConfig in android/app/build.gradle')

          path.write_text(text)
          PY

      - name: Build release APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p ../apk-output
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' -type f | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was produced."
            find android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$APK_PATH" ../apk-output/finance-latest.apk
          ls -lh ../apk-output/finance-latest.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-latest-apk
          path: apk-output/finance-latest.apk
          if-no-files-found: error

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd ..
          if ! gh release view finance-latest-apk >/dev/null 2>&1; then
            gh release create finance-latest-apk \
              --title 'Finance Latest APK' \
              --notes 'آخر نسخة APK مبنية محليًا عبر Gradle بدون استخدام EAS.'
          fi
          gh release upload finance-latest-apk apk-output/finance-latest.apk --clobber
